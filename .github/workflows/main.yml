name: Run Python Script and Save Output

on:
  push:
    branches: [ "**" ]
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up the Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # Specify your preferred version

      # 3. Install dependencies (if you have a requirements.txt)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 4. Run your script
      # Replace 'main.py' with your script's filename
      - name: Run script
        run: python htmltopdf.py
      # 5. Upload the output files as artifacts
      - name: Upload Output Files
        uses: actions/upload-artifact@v4
        with:
          name: script-output-files # The name of the zip file you'll download
          path: |
            output/
            *.pdf
            results.txt
          # The 'path' can be a directory, a specific file, or a wildcard.
          
