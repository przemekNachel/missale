name: Generate PDFs with Selenium

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # We need selenium, webdriver-manager, and pypdf
          pip install selenium webdriver-manager pypdf

      - name: Run script
        # No change to command, but environment now supports Chrome
        run: python htmltopdf.py

      - name: Upload Output Files
        if: always() # Upload even if the script crashes so you can see why
        uses: actions/upload-artifact@v4
        with:
          name: script-output-files
          path: |
            missale_ready.pdf
          
