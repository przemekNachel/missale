name: Generate PDFs with Selenium

on:
  push:
    branches: [ "**" ] # It's usually best to deploy from your default branch
  workflow_dispatch:

# Permissions required to deliver content to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager pypdf

      - name: Run script
        run: python htmltopdf.py

      # GitHub Pages expects a directory, so we move the PDF into one
      - name: Prepare for deployment
        run: |
          mkdir -p public
          cp missale_ready.pdf public/

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public' # Points to the folder we just created

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
