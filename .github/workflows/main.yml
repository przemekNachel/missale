jobs:
  build:
    runs-on: ubuntu-latest
    # --- ADD THESE TWO LINES ---
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # ---------------------------

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ... (rest of your python/selenium steps) ...

      - name: Run script
        run: python htmltopdf.py

      - name: Prepare for deployment
        run: |
          mkdir -p public
          cp missale_ready.pdf public/
          echo "<html><body><h1>PDF Output</h1><a href='missale_ready.pdf'>View PDF</a></body></html>" > public/index.html

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
