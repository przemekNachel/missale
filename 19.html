    <p style="text-align: center; margin-top: 10px;"><b>ODPUST DLA NOWOŻEŃCÓW</b></p>
    <p class="red-info">Ojciec Św. Jan XXIII udzielił odpustu 300 dni małżonkom, którzy w dniu ślubu ucałują obrączkę ślubną żony i odmówią wspólnie modlitwę:</p>
    <p>&emsp;Daj nam, Panie, abyśmy miłując Ciebie kochali się wzajemnie i żyli według Twojego świętego prawa.</p>
